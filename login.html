<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Shoply</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="index.css">
<style>
  .auth-toggle { display: flex; background: var(--bg); border-radius: var(--radius); padding: 4px; margin-bottom: 28px; }
  .auth-toggle button { flex: 1; background: none; border: none; padding: 10px; font-weight: 600; font-size: 0.88rem; border-radius: 3px; color: var(--muted); }
  .auth-toggle button.active { background: var(--white); color: var(--ink); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .signup-fields { display: none; }
  .signup-fields.show { display: block; }
  .login-fields.hide { display: none; }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo">shop<span>ly</span></a>
    <nav class="main-nav">
      <a href="index.html">Home</a>
      <a href="listing.html">Shop</a>
    </nav>
    <div class="header-actions">
      <a href="cart.html" class="icon-link" aria-label="Cart">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="cart-count">3</span>
      </a>
    </div>
  </div>
</header>

<div class="auth-wrap">
  <div class="auth-card">

    <div class="auth-toggle">
      <button class="active" id="loginTab" onclick="showLogin()">Sign In</button>
      <button id="signupTab" onclick="showSignup()">Create Account</button>
    </div>

    <!-- ===== LOGIN ===== -->
    <div id="loginPanel">
      <h1>Welcome back</h1>
      <p class="sub">Sign in to track orders and check out faster.</p>

      <form onsubmit="event.preventDefault(); alert('Hook this up to your login API.');">
        <div class="auth-field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required>
        </div>
        <div class="auth-field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <div class="auth-row">
          <label class="checkbox-row"><input type="checkbox"> Remember me</label>
          <a href="#">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
      </form>

      <div class="auth-divider">or</div>
      <button class="btn btn-outline btn-block" onclick="alert('Hook this up to Google OAuth.')">Continue with Google</button>

      <p class="auth-foot">Don't have an account? <a href="#" onclick="showSignup(); return false;">Create one</a></p>
    </div>

    <!-- ===== SIGNUP ===== -->
    <div id="signupPanel" style="display:none;">
      <h1>Create your account</h1>
      <p class="sub">Join Shoply to save your cart and order history.</p>

      <form onsubmit="event.preventDefault(); alert('Hook this up to your signup API.');">
        <div class="auth-field">
          <label for="signup-name">Full Name</label>
          <input type="text" id="signup-name" placeholder="Jane Doe" required>
        </div>
        <div class="auth-field">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com" required>
        </div>
        <div class="auth-field">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" placeholder="At least 8 characters" required>
        </div>
        <div class="auth-row" style="margin-bottom:18px;">
          <label class="checkbox-row"><input type="checkbox" required> I agree to the Terms & Privacy Policy</label>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
      </form>

      <p class="auth-foot">Already have an account? <a href="#" onclick="showLogin(); return false;">Sign in</a></p>
    </div>

  </div>
</div>

<footer class="site-footer">
  <div class="footer-bottom">
    <span>© 2026 Shoply. All rights reserved.</span>
    <span>Built with HTML & CSS</span>
  </div>
</footer>

<script>
  function showLogin() {
    document.getElementById('loginPanel').style.display = 'block';
    document.getElementById('signupPanel').style.display = 'none';
    document.getElementById('loginTab').classList.add('active');
    document.getElementById('signupTab').classList.remove('active');
  }
  function showSignup() {
    document.getElementById('loginPanel').style.display = 'none';
    document.getElementById('signupPanel').style.display = 'block';
    document.getElementById('signupTab').classList.add('active');
    document.getElementById('loginTab').classList.remove('active');
  }
</script>

</body>
</html>
